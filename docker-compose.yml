x-app-build: &app-build
  context: .
  args:
    NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME:?Set NEXT_PUBLIC_BOT_USERNAME}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-directbuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-directbuy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-directbuy}" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  admin-panel:
    build: *app-build
    restart: unless-stopped
    command: [ "sh", "-c", "pnpm exec prisma migrate deploy && pnpm exec tsx prisma/seed-settings.ts && node .next/standalone/server.js" ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-directbuy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-directbuy}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN}
      ADMIN_SESSION_TOKEN: ${ADMIN_SESSION_TOKEN:?Set ADMIN_SESSION_TOKEN}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Set ADMIN_API_KEY}
      NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME:?Set NEXT_PUBLIC_BOT_USERNAME}
      MANAGER_CHAT_ID: ${MANAGER_CHAT_ID:?Set MANAGER_CHAT_ID}
      PLATFORM_FEE_RUB: ${PLATFORM_FEE_RUB:-100000}
      SLA_DOCS_UPLOAD_HOURS: ${SLA_DOCS_UPLOAD_HOURS:-2}
      SLA_INVESTOR_REVIEW_HOURS: ${SLA_INVESTOR_REVIEW_HOURS:-24}
      SLA_OFFER_RESPONSE_HOURS: ${SLA_OFFER_RESPONSE_HOURS:-2}
      BOT_ACTIVE: ${BOT_ACTIVE:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: *app-build
    restart: unless-stopped
    command: [ "pnpm", "exec", "tsx", "bot/start.ts" ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-directbuy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-directbuy}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN}
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: *app-build
    restart: unless-stopped
    command: [ "pnpm", "exec", "tsx", "lib/queue/worker.ts" ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-directbuy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-directbuy}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN:?Set BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - admin-panel

volumes:
  pgdata:
  redisdata:
  uploads:
  caddy_data:
  caddy_config:
